# Netlify: Vite builds the SPA into dist/public (see vite.config.ts)
[build]
  command = "corepack enable && pnpm install && pnpm build"
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "20"

# SPA: send all routes to index.html for client-side routing (wouter)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
